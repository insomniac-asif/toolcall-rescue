<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 430" width="720" height="430" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">
  <rect x="8" y="8" width="704" height="414" rx="12" fill="#0d1117" stroke="#30363d" stroke-width="1.5"/>
  <circle cx="34" cy="38" r="6" fill="#ff5f56"/>
  <circle cx="54" cy="38" r="6" fill="#ffbd2e"/>
  <circle cx="74" cy="38" r="6" fill="#27c93f"/>
  <text x="100" y="43" fill="#8b949e" font-size="14">toolcall_rescue.rescue(content)</text>
  <line x1="24" y1="60" x2="696" y2="60" stroke="#21262d" stroke-width="1"/>

  <text x="30" y="86" fill="#8b949e" font-size="12.5">the tool call your SDK's <tspan fill="#c9d1d9">tool_calls</tspan> field missed, stuck in message.content:</text>
  <rect x="28" y="98" width="664" height="112" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="44" y="126" fill="#8b949e" font-size="13">&lt;tool_call&gt;{"name": "ban", "arguments": {"id": 42}}&lt;/tool_call&gt;</text>
  <text x="44" y="154" fill="#e3b341" font-size="13">＜｜｜DSML｜｜invoke name="delete_role"＞ ... （fullwidth）</text>
  <text x="44" y="182" fill="#8b949e" font-size="13">{name:'search', arguments:{q:'ramen',}}  // dirty json</text>

  <text x="360" y="246" fill="#58a6ff" font-size="13" text-anchor="middle">rescue()  ▼</text>

  <text x="30" y="286" fill="#8b949e" font-size="12.5">back to a normal list of calls:</text>
  <rect x="28" y="298" width="664" height="60" rx="8" fill="#161b22" stroke="#238636" stroke-width="1.2"/>
  <text x="44" y="334" fill="#3fb950" font-size="13.5">[{"name": "ban", "arguments": {"id": "42"}},  {"name": "delete_role", ...}]</text>

  <text x="30" y="392" fill="#6e7681" font-size="12.5">one string in, tool calls out — zero dependencies, no network, no model.</text>
</svg>
